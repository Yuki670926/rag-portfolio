name: Terraform Dispatch (plan / apply)

# 手動 dispatch で plan / apply を選べる。
# TFVARS secret 変更（例: vector_store_type 切替）など、コード差分を伴わない変更でも
# 先に command=plan で差分をレビューしてから command=apply できるようにするための安全ゲート。
# default は安全側の plan（無指定 dispatch で誤 apply しない）。
on:
  workflow_dispatch:
    inputs:
      command:
        description: "plan か apply"
        type: choice
        options:
          - plan
          - apply
        default: plan
      environment:
        description: "対象環境"
        type: choice
        options:
          - dev
          - stag
          - prod
        default: dev
      vector_store:
        description: "ベクトルストア上書き（keep=TFVARS既定を使用）"
        type: choice
        options:
          - keep
          - s3_vectors
          - opensearch
        default: keep
      private_networking:
        description: "VPC隔離(層3)上書き（keep=TFVARS既定を使用）"
        type: choice
        options:
          - keep
          - "false"
          - "true"
        default: keep

# 同一環境への並行実行を直列化（state の use_lockfile と併せた二重防御。後発はキャンセルせず待機）
concurrency:
  group: terraform-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  run:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: ${{ inputs.environment }}
      command: ${{ inputs.command }}
      vector_store: ${{ inputs.vector_store }}
      private_networking: ${{ inputs.private_networking }}
    secrets: inherit
