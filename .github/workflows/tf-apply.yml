name: Terraform Apply

on:
  workflow_dispatch:        # 手動ボタンで起動

jobs:
  apply:
    uses: ./.github/workflows/_terraform.yml   # モジュール本体を呼ぶ
    with:
      environment: dev      # ← dev の Environment（その secret が使われる）
      command: apply
    secrets: inherit        # ← Environment secret をモジュールへ通す
