name: Unit Tests

# Lambda ハンドラの単体テスト（pytest）。AWS は moto / monkeypatch でモックするため
# クレデンシャル不要・OIDC 権限も付与しない。重要な不変条件（user_id fail-closed・
# RRF・決定的 _id・covering ジョブの status フィルタ・認可）を回帰から守る。
# action は SHA 固定（_terraform.yml と同方針・更新は Dependabot）。

on:
  pull_request:
    paths:
      - "lambda/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "pytest.ini"
      - ".github/workflows/test.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "lambda/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13" # 本番ランタイムに合わせる

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest
