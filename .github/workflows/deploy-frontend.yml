name: Deploy Frontend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "配信先環境（手動 dispatch 時）"
        type: choice
        options:
          - dev
          - stag
          - prod
        default: dev

# 同一環境への並行配信を直列化
concurrency:
  group: frontend-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main への push は dev、手動 dispatch は選択環境へ配信。
    # FRONTEND_BUCKET / FRONTEND_DEPLOY_ROLE_ARN / CF_DISTRIBUTION_ID は対応する
    # GitHub Environment の secret から解決する（dev は repo secret 既定でも可）。
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Sync to S3
        run: |
          # config.json は Terraform 管理（module.s3.aws_s3_object.config）でバケットに存在し、
          # frontend/ には含まれない。--delete で消さないよう必ず除外する
          # （除外しないと毎回 config.json が消え、フロントの設定取得が失敗して login 不能になる）。
          aws s3 sync frontend/ s3://${{ secrets.FRONTEND_BUCKET }} --delete --exclude "config.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
