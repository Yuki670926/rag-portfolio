name: Deploy Frontend

# action は全てフルコミット SHA で固定（_terraform.yml と同方針）。更新は Dependabot。

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "配信先環境（手動 dispatch 時）"
        type: choice
        options:
          - dev
          - stag
          - prod
        default: dev

# 同一環境のデプロイ系（tf-apply / tf-plan / 本ワークフロー）を単一グループで直列化。
# tf-apply は同じ frontend バケット・CloudFront を Terraform 管理しており、
# 別グループだと s3 sync --delete と apply が同時に走り得るため group を統一する。
concurrency:
  group: terraform-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main への push は dev、手動 dispatch は選択環境へ配信。
    # FRONTEND_BUCKET / FRONTEND_DEPLOY_ROLE_ARN / CF_DISTRIBUTION_ID は対応する
    # GitHub Environment の secret から解決する（dev は repo secret 既定でも可）。
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Sync to S3
        run: |
          # config.json は Terraform 管理（module.s3.aws_s3_object.config）でバケットに存在し、
          # frontend/ には含まれない。--delete で消さないよう必ず除外する
          # （除外しないと毎回 config.json が消え、フロントの設定取得が失敗して login 不能になる）。
          aws s3 sync frontend/ s3://${{ secrets.FRONTEND_BUCKET }} --delete --exclude "config.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
