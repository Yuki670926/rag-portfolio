name: _terraform        # 再利用ワークフロー（モジュール本体）：直接は起動しない。他から呼ばれる。

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string      # dev / stg / prod
      command:
        required: true
        type: string      # plan or apply

jobs:
  run:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # この Environment の secret（AWS_ROLE_ARN / TFVARS）が使われる
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.2

      - name: Build Lambda layers          # build/ は未コミットなので CI で Docker ビルドして生成
        run: |
          bash scripts/build-layer.sh authorizer
          bash scripts/build-layer.sh ingest-query
          # 再現性確保：pip が付ける mtime がビルド毎に変わり archive_file の hash が変動するため固定
          find layers/*/build -exec touch -t 200001010000 {} +

      - name: Restore tfvars from secret
        run: |
          cat > terraform/environments/${{ inputs.environment }}.tfvars << 'EOF'
          ${{ secrets.TFVARS }}
          EOF

      - name: Terraform Init
        run: terraform init -backend-config="environments/${{ inputs.environment }}-backend.hcl" -reconfigure
        working-directory: terraform

      - name: Terraform Plan
        if: inputs.command == 'plan'
        run: terraform plan -no-color -var-file="environments/${{ inputs.environment }}.tfvars"
        working-directory: terraform

      - name: Terraform Apply
        if: inputs.command == 'apply'
        run: terraform apply -auto-approve -var-file="environments/${{ inputs.environment }}.tfvars"
        working-directory: terraform
