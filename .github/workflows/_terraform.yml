name: _terraform        # 再利用ワークフロー（モジュール本体）：直接は起動しない。他から呼ばれる。

# サプライチェーン対策：action は全てフルコミット SHA で固定（タグは可変＝改竄で
# OIDC クレデンシャル窃取が成立し得るため）。バージョン更新は Dependabot の PR で行う。

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string      # dev / stg / prod
      command:
        required: true
        type: string      # plan or apply
      vector_store:
        required: false
        type: string
        default: keep     # keep=TFVARS既定 / s3_vectors / opensearch（-var で上書き）
      private_networking:
        required: false
        type: string
        default: keep     # keep=TFVARS既定 / false / true（-var で上書き）

jobs:
  run:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # この Environment の secret（AWS_ROLE_ARN / TFVARS）が使われる
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Checkov は最も信頼度の低い第三者 action のため、AWS クレデンシャル取得より
      # 前に実行する（env にクレデンシャルが載った状態でサードパーティを動かさない）。
      - name: Checkov IaC scan             # plan 時のみ。非ブロッキングのアドバイザリ（findings/エラーで plan を止めない）
        if: inputs.command == 'plan'
        continue-on-error: true
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: terraform
          download_external_modules: true
          soft_fail: true
          quiet: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.2

      - name: Build Lambda layers          # build/ は未コミットなので CI で Docker ビルド。再現性(no-compile/mtime固定)はスクリプト内
        run: |
          bash scripts/build-layer.sh authorizer
          bash scripts/build-layer.sh ingest-query

      - name: Restore tfvars from secret
        run: |
          cat > terraform/environments/${{ inputs.environment }}.tfvars << 'EOF'
          ${{ secrets.TFVARS }}
          EOF

      - name: Terraform Init
        run: terraform init -backend-config="environments/${{ inputs.environment }}-backend.hcl" -reconfigure
        working-directory: terraform

      # ベクトルストア/ネットワークの一時上書き（keep 以外なら -var で tfvars を上書き）。
      # 2x2 マトリクス（vector_store × private_networking）検証を secret 無改変で回すため。
      - name: Build override vars
        id: ov
        run: |
          EXTRA=""
          if [ "${{ inputs.vector_store }}" != "keep" ]; then EXTRA="$EXTRA -var=vector_store_type=${{ inputs.vector_store }}"; fi
          if [ "${{ inputs.private_networking }}" != "keep" ]; then EXTRA="$EXTRA -var=enable_private_networking=${{ inputs.private_networking }}"; fi
          echo "extra=$EXTRA" >> "$GITHUB_OUTPUT"
          echo "override args: $EXTRA"

      - name: Terraform Plan
        if: inputs.command == 'plan'
        run: terraform plan -no-color -var-file="environments/${{ inputs.environment }}.tfvars" ${{ steps.ov.outputs.extra }}
        working-directory: terraform

      - name: Terraform Apply
        if: inputs.command == 'apply'
        run: terraform apply -auto-approve -var-file="environments/${{ inputs.environment }}.tfvars" ${{ steps.ov.outputs.extra }}
        working-directory: terraform
