name: _terraform        # 再利用ワークフロー（モジュール本体）：直接は起動しない。他から呼ばれる。

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_call:          # 「呼ばれて動く」という宣言
    inputs:               # ← Terraform モジュールの variable に相当
      environment:
        required: true
        type: string      # dev / stg / prod
      command:
        required: true
        type: string      # plan or apply

jobs:
  run:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # ← この1行が肝。指定した Environment の secret（AWS_ROLE_ARN / TFVARS）が使われる
    permissions:
      id-token: write      # OIDC で AWS にログインするのに必須
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}   # その環境の Environment secret
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.2

      - name: Restore tfvars from secret
        run: |
          cat > terraform/environments/${{ inputs.environment }}.tfvars << 'EOF'
          ${{ secrets.TFVARS }}
          EOF

      - name: Terraform Init
        run: terraform init -backend-config="environments/${{ inputs.environment }}-backend.hcl" -reconfigure
        working-directory: terraform

      - name: Terraform Plan
        if: inputs.command == 'plan'
        run: terraform plan -no-color -var-file="environments/${{ inputs.environment }}.tfvars"
        working-directory: terraform

      - name: Terraform Apply
        if: inputs.command == 'apply'
        run: terraform apply -auto-approve -var-file="environments/${{ inputs.environment }}.tfvars"
        working-directory: terraform
