name: Secret Scan

# 秘密混入を「ルールではなくメカニズムで」防ぐ：gitleaks が PR / push 時に
# 全履歴をスキャンし、検出があればブロックする。
# AWS クレデンシャルは一切不要なジョブ（OIDC 権限も付与しない）。
# action は SHA 固定（_terraform.yml と同方針・更新は Dependabot）。

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # 全履歴を対象にする（直近コミットだけでは過去混入を見逃す）

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
