name: Terraform Plan

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "terraform/**"

jobs:
  plan:
    uses: ./.github/workflows/_terraform.yml   # モジュール本体を呼ぶ
    with:
      environment: dev      # ← dev の Environment（その secret が使われる）
      command: plan
    secrets: inherit        # ← 呼び出し元の secret をモジュールへ通す（Environment secret もこれで届く）
