name: Terraform Plan

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "terraform/**"
      - "layers/**"             # 依存変更（requirements.lock 等）は layer 実体＝インフラを変えるので plan 対象
      - "scripts/build-layer.sh" # layer ビルド手順の変更も同様
      - "lambda/**"              # handler 変更も archive_file 経由でインフラ差分になるため plan 対象

# plan も state を読む（use_lockfile のロックを短時間取得）ため apply と同じグループで直列化
concurrency:
  group: terraform-dev
  cancel-in-progress: false

jobs:
  plan:
    permissions:          # ← 追加：OIDC 権限は呼び出し側で付与
      id-token: write
      contents: read
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: dev
      command: plan
    secrets: inherit