<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Document QA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    header { background: #232f3e; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { font-size: 13px; opacity: 0.7; }

    .auth-card { background: white; border-radius: 8px; padding: 32px; max-width: 400px; margin: 60px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .auth-card h2 { font-size: 20px; margin-bottom: 24px; color: #232f3e; }
    .auth-card input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
    .auth-card button { width: 100%; padding: 10px; background: #ff9900; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .auth-card button:hover { background: #e68900; }
    .auth-card .error { color: #e53e3e; font-size: 13px; margin-top: 8px; }

    .main { display: none; }
    .main.active { display: block; }

    .tabs { display: flex; gap: 8px; margin: 20px 0; }
    .tab { padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 14px; }
    .tab.active { background: #232f3e; color: white; border-color: #232f3e; }

    .panel { display: none; }
    .panel.active { display: block; }

    /* チャットUI */
    .chat-box { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
    .chat-messages { height: 420px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 80%; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .message-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .user .message-bubble { background: #232f3e; color: white; border-bottom-right-radius: 4px; }
    .assistant .message-bubble { background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }
    .message-sources { font-size: 12px; color: #888; margin-top: 4px; }
    .mode-toggle { display: flex; gap: 6px; padding: 10px 16px 0; }
    .mode-btn { padding: 5px 14px; border-radius: 14px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 12.5px; color: #555; }
    .mode-btn.active { background: #232f3e; color: white; border-color: #232f3e; }
    .chat-input { display: flex; gap: 8px; padding: 16px; border-top: 1px solid #eee; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .chat-input button { padding: 10px 20px; background: #ff9900; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .chat-input button:disabled { background: #ccc; cursor: not-allowed; }

    /* アップロードUI */
    .upload-box { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 32px; text-align: center; }
    .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 48px; margin-bottom: 20px; cursor: pointer; transition: border-color 0.2s; }
    .upload-area:hover { border-color: #ff9900; }
    .upload-area p { color: #888; font-size: 14px; margin-top: 8px; }
    .upload-area .icon { font-size: 48px; }
    .upload-box button { padding: 10px 32px; background: #ff9900; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .upload-box button:disabled { background: #ccc; cursor: not-allowed; }
    .upload-status { margin-top: 16px; font-size: 14px; color: #555; }

    .loading { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #888; animation: bounce 1s infinite; }
    .loading:nth-child(2) { animation-delay: 0.2s; }
    .loading:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

    .logout-btn { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .logout-btn:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="authSection">
  <header>
    <h1>📄 RAG Document QA</h1>
    <span>Powered by AWS Bedrock</span>
  </header>
  <div class="auth-card">
    <h2>ログイン</h2>
    <input type="email" id="email" placeholder="メールアドレス" />
    <input type="password" id="password" placeholder="パスワード" />
    <button onclick="login()">ログイン</button>
    <div class="error" id="authError"></div>
  </div>
</div>

<!-- メイン画面 -->
<div id="mainSection" class="main">
  <header>
    <h1>📄 RAG Document QA</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="userEmail" style="font-size:13px;opacity:0.8"></span>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </header>
  <div class="container">
    <div class="tabs">
      <div class="tab active" onclick="showTab('chat', this)">💬 チャット</div>
      <div class="tab" onclick="showTab('upload', this)">📁 ドキュメント追加</div>
    </div>

    <!-- チャットパネル -->
    <div class="panel active" id="chatPanel">
      <div class="chat-box">
        <div class="chat-messages" id="chatMessages">
          <div class="message assistant">
            <div class="message-bubble">こんにちは！アップロードされたドキュメントについて質問してください。</div>
          </div>
        </div>
        <div class="mode-toggle" id="modeToggle" style="display:none">
          <button id="modeFast" class="mode-btn active" onclick="setMode('fast')">⚡ ふつう（高速）</button>
          <button id="modePrecise" class="mode-btn" onclick="setMode('precise')">🎯 高精度（ハイブリッド検索）</button>
        </div>
        <div class="chat-input">
          <input type="text" id="questionInput" placeholder="質問を入力してください..." onkeypress="handleKeyPress(event)" />
          <button id="sendBtn" onclick="sendQuestion()">送信</button>
        </div>
      </div>
    </div>

    <!-- アップロードパネル -->
    <div class="panel" id="uploadPanel">
      <div class="upload-box">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
          <div class="icon">📄</div>
          <p>クリックしてPDFを選択</p>
          <p id="fileName" style="color:#333;font-weight:500;margin-top:8px"></p>
        </div>
        <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="fileSelected()" />
        <button id="uploadBtn" onclick="uploadFile()" disabled>アップロード</button>
        <div class="upload-status" id="uploadStatus"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let CONFIG = {};

async function loadConfig() {
  // config.json は Terraform 管理（S3 に生成）。CloudFront は SPA 用に 403→200 で
  // /index.html を返すフォールバックを持つため、config.json 欠落時も「HTTP 200 の HTML」
  // が返り得る → res.ok だけでは検知できず、JSON parse と必須キーの存在まで確認する。
  try {
    const res = await fetch('/config.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const cfg = await res.json();
    if (!cfg.REGION || !cfg.CLIENT_ID || !cfg.API_URL) throw new Error("必須キーが不足しています");
    CONFIG = cfg;
    return true;
  } catch (e) {
    console.error('設定ファイルの読み込みに失敗しました:', e);
    return false;
  }
}

window.addEventListener('DOMContentLoaded', async () => {
  const loginBtn = document.querySelector('.auth-card button');
  loginBtn.disabled = true;
  const ok = await loadConfig();
  if (!ok) {
    // 設定なしでログインを許すと cognito-idp.undefined... への fetch 失敗という
    // 原因不明エラーになるため、理由を明示してログインを止める（fail-closed）。
    document.getElementById("authError").textContent =
      "設定の読み込みに失敗しました。ページを再読み込みしてください。";
    return; // loginBtn は disabled のまま
  }
  loginBtn.disabled = false;
  // 二刀流（dual）構成のときだけ検索モードのトグルを表示
  if (CONFIG.VECTOR_STORE_TYPE === "dual") {
    document.getElementById("modeToggle").style.display = "flex";
  }
});

  function setMode(m) {
    searchMode = m;
    document.getElementById("modeFast").classList.toggle("active", m === "fast");
    document.getElementById("modePrecise").classList.toggle("active", m === "precise");
  }

  let idToken = null;
  let currentUser = null;
  let searchMode = "fast";   // fast | precise（dual 構成のときのみ UI に出る）
  const loadingTimers = {};  // ローディングメッセージごとの経過/ステージ更新タイマー

  // ========== 認証 ==========
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    document.getElementById("authError").textContent = "";

    try {
      const res = await fetch(`https://cognito-idp.${CONFIG.REGION}.amazonaws.com/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-amz-json-1.1",
          "X-Amz-Target": "AWSCognitoIdentityProviderService.InitiateAuth"
        },
        body: JSON.stringify({
          AuthFlow: "USER_PASSWORD_AUTH",
          ClientId: CONFIG.CLIENT_ID,
          AuthParameters: { USERNAME: email, PASSWORD: password }
        })
      });
      const data = await res.json();
      if (data.AuthenticationResult) {
        idToken = data.AuthenticationResult.IdToken;
        currentUser = email;
        document.getElementById("userEmail").textContent = email;
        document.getElementById("authSection").style.display = "none";
        document.getElementById("mainSection").classList.add("active");
      } else {
        document.getElementById("authError").textContent = "ログインに失敗しました。メールとパスワードを確認してください。";
      }
    } catch (e) {
      document.getElementById("authError").textContent = "エラーが発生しました: " + e.message;
    }
  }

  function logout() {
    idToken = null;
    currentUser = null;
    document.getElementById("authSection").style.display = "block";
    document.getElementById("mainSection").classList.remove("active");
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
  }

  // セッション(idToken)が期限切れ(API が 401)のときの誘導。ログイン画面へ戻し理由を明示する。
  // email は残して素早く再ログインできるようにする（再ログインで Post-Auth ウォーマーも起動）。
  function sessionExpired() {
    idToken = null;
    currentUser = null;
    document.getElementById("authSection").style.display = "block";
    document.getElementById("mainSection").classList.remove("active");
    document.getElementById("authError").textContent =
      "セッションの有効期限が切れました。お手数ですが、もう一度ログインしてください。";
    // polling 中だった索引化表示は更新されなくなるため消す（凍結表示の誤認防止）
    document.getElementById("uploadStatus").textContent = "";
  }

  // ========== タブ ==========
  function showTab(tab, el) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab + "Panel").classList.add("active");
    el.classList.add("active");
  }

  // ========== チャット ==========
  function handleKeyPress(e) {
    if (e.key === "Enter") sendQuestion();
  }

  async function sendQuestion() {
    // 送信中ガード：Enter キーはボタンの disabled を迂回するため、ここで弾かないと
    // /query が並行二重送信される（回答順序の前後・ボタン状態の不整合の原因）。
    if (document.getElementById("sendBtn").disabled) return;
    const input = document.getElementById("questionInput");
    const question = input.value.trim();
    if (!question) return;

    addMessage("user", question);
    input.value = "";
    document.getElementById("sendBtn").disabled = true;

    const loadingId = addLoadingMessage();

    try {
      const res = await fetch(`${CONFIG.API_URL}/query`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": idToken
        },
        body: JSON.stringify({ question, mode: searchMode })
      });
      removeMessage(loadingId);

      // 401/403 = セッション(idToken)の期限切れ → 「不明なエラー」ではなく再ログインへ誘導
      if (res.status === 401 || res.status === 403) {
        document.getElementById("sendBtn").disabled = false;
        sessionExpired();
        return;
      }

      const data = await res.json();
      if (data.answer) {
        addMessage("assistant", data.answer, data.sources, { mode: data.mode, fallback: data.fallback });
      } else {
        addMessage("assistant", "エラーが発生しました: " + (data.error || "不明なエラー"));
      }
    } catch (e) {
      removeMessage(loadingId);
      addMessage("assistant", "通信エラーが発生しました: " + e.message);
    }

    document.getElementById("sendBtn").disabled = false;
  }

  // XSS 対策：回答・出典はサーバ/文書由来のテキスト。innerHTML に入れる前に必ずエスケープする
  // （文書に埋め込まれた HTML/スクリプトが回答経由で実行されるのを防ぐ）。
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function addMessage(role, text, sources, meta) {
    const messages = document.getElementById("chatMessages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    let metaHtml = "";
    if (meta && meta.mode && CONFIG.VECTOR_STORE_TYPE === "dual") {
      const badge = meta.mode === "precise" ? "🎯 高精度" : "⚡ ふつう";
      const note = meta.fallback
        ? "（高精度は準備中のため通常検索で回答しました。まもなく利用可能になります）" : "";
      metaHtml = `<div class="message-sources">${badge}で回答${escapeHtml(note)}</div>`;
    }
    const sourcesHtml = sources && sources.length > 0
      ? `<div class="message-sources">📎 出典: ${sources.map(escapeHtml).join(", ")}</div>` : "";
    div.innerHTML = `<div class="message-bubble">${escapeHtml(text).replace(/\n/g, "<br>")}</div>${metaHtml}${sourcesHtml}`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div.id = "msg-" + Date.now();
  }

  function addLoadingMessage() {
    const messages = document.getElementById("chatMessages");
    const div = document.createElement("div");
    const id = "loading-" + Date.now();
    div.id = id;
    div.className = "message assistant";
    // 段階的な進捗表示：検索 → 生成 ＋ 経過秒、コールド時はウォームアップ案内。
    // バックエンドは単一リクエスト（検索→生成を内部実行）なので、ここでは実測の
    // 所要時間に合わせたステージ近似を表示する（厳密な段階通知はストリーミング化＝
    // 項目3で対応）。
    div.innerHTML = `<div class="message-bubble">`
      + `<span id="${id}-label">🔍 ドキュメントを検索中…</span> `
      + `<span id="${id}-time" style="opacity:0.55;font-size:12px"></span> `
      + `<span class="loading"></span><span class="loading"></span><span class="loading"></span>`
      + `</div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    const start = Date.now();
    loadingTimers[id] = setInterval(() => {
      const sec = Math.floor((Date.now() - start) / 1000);
      const timeEl = document.getElementById(id + "-time");
      const labelEl = document.getElementById(id + "-label");
      if (timeEl) timeEl.textContent = `(${sec}秒)`;
      if (labelEl) {
        if (sec >= 16) labelEl.textContent = "⏳ ベクトルストアをウォームアップ中…（初回は時間がかかります）";
        else if (sec >= 3) labelEl.textContent = "✍️ 回答を生成中…";
      }
    }, 500);
    return id;
  }

  function removeMessage(id) {
    if (loadingTimers[id]) { clearInterval(loadingTimers[id]); delete loadingTimers[id]; }
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ========== アップロード ==========
  function fileSelected() {
    const file = document.getElementById("fileInput").files[0];
    if (file) {
      document.getElementById("fileName").textContent = file.name;
      document.getElementById("uploadBtn").disabled = false;
    }
  }

  async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return;

  document.getElementById("uploadBtn").disabled = true;
  document.getElementById("uploadStatus").textContent = "署名付きURLを取得中...";

  try {
    // Step1: Presigned URLを取得
    const res = await fetch(`${CONFIG.API_URL}/upload`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": idToken
      },
      body: JSON.stringify({
        filename: file.name,
        content_type: "application/pdf"
      })
    });

    // 401/403 = セッション期限切れ → 再ログインへ誘導
    if (res.status === 401 || res.status === 403) {
      document.getElementById("uploadBtn").disabled = false;
      sessionExpired();
      return;
    }

    const data = await res.json();
    if (!data.upload_url) {
      throw new Error(data.error || "URLの取得に失敗しました");
    }

    document.getElementById("uploadStatus").textContent = "S3にアップロード中...";

    // Step2: S3に直接アップロード
    const uploadRes = await fetch(data.upload_url, {
      method: "PUT",
      headers: {
        "Content-Type": "application/pdf"
      },
      body: file
    });

    if (!uploadRes.ok) {
      throw new Error("S3へのアップロードに失敗しました");
    }

    const uploadedName = file.name;
    document.getElementById("fileName").textContent = "";
    document.getElementById("fileInput").value = "";
    // 索引化の「準備完了」を /status で polling し、完了したら明示する（#1b）。
    // await しない（ボタンを最大 90 秒拘束しないため）。連続アップロード時の
    // 表示の奪い合いは pollIndexStatus 側の世代カウンタで排他する。
    pollIndexStatus(uploadedName);
    // 成功時はボタンを無効のまま（ファイル未選択状態に戻るため。次の選択で再有効化）

  } catch (e) {
    document.getElementById("uploadStatus").textContent = "❌ エラー: " + e.message;
    // 失敗時はファイルが残っているので、同じファイルで再試行できるよう戻す
    document.getElementById("uploadBtn").disabled = false;
  }
}

  // ========== 索引化の準備完了 polling（#1b） ==========
  // アップロード後、ingest が pdf_indexes に書く ready フラグを GET /status で監視し、
  // 完了したら「質問できます」を明示する。最大 90 秒でタイムアウト（その場合は案内のみ）。
  // 世代カウンタ：連続アップロードで polling ループが多重化したとき、古いループが
  // 同じ #uploadStatus に書き込んで表示がちらつくのを防ぐ（最新世代だけが表示を持つ）。
  let pollGeneration = 0;
  async function pollIndexStatus(pdfName) {
    const myGen = ++pollGeneration;
    const statusEl = document.getElementById("uploadStatus");
    const start = Date.now();
    // fast(KB) を含む構成は per-doc 判定の導入で「ジョブ完了まで」が正直に出るように
    // なった分、完了まで分単位かかる（KB の一括同期ジョブ）→ タイムアウトを延長
    const TIMEOUT_MS = (CONFIG.VECTOR_STORE_TYPE === "opensearch") ? 90000 : 180000;
    let partialMsg = "";  // dual で片方だけ ready のときの表示（timeout 時にも残す）
    while (Date.now() - start < TIMEOUT_MS) {
      if (myGen !== pollGeneration) return; // 新しいアップロードに表示を譲って退出
      try {
        const res = await fetch(`${CONFIG.API_URL}/status?pdf=${encodeURIComponent(pdfName)}`, {
          headers: { "Authorization": idToken }
        });
        // 401/403 = セッション期限切れ → polling を止めて再ログインへ誘導
        if (res.status === 401 || res.status === 403) {
          sessionExpired();
          return;
        }
        if (res.ok) {
          const data = await res.json();
          if (myGen !== pollGeneration) return;
          const st = data.stores || {};
          const dual = CONFIG.VECTOR_STORE_TYPE === "dual" && st.fast && st.precise;
          if (dual && data.ready && !(st.fast.ready && st.precise.ready)) {
            // 片方だけ準備完了：質問は可能だがモードを明示し、両方揃うまで polling 継続
            // （既定モード⚡が未準備のまま「完了」と言うと、質問が「該当情報なし」に
            //   なり故障に見えるため）
            const ready = st.precise.ready ? "🎯 高精度" : "⚡ ふつう";
            const waiting = st.precise.ready ? "⚡ ふつう" : "🎯 高精度";
            partialMsg = `✅ ${ready}モードで質問できます（${waiting}は索引化中…）`;
            statusEl.textContent = partialMsg;
          } else if (data.ready) {
            const n = (data.chunks != null) ? `${data.chunks} チャンク` : "完了";
            statusEl.textContent = dual
              ? "✅ 索引化完了（⚡/🎯 両モードで質問できます）。"
              : `✅ 索引化完了（${n}）。チャットで質問できます。`;
            return;
          }
        }
      } catch (e) { /* ネットワーク一時失敗は無視して継続 */ }
      if (myGen !== pollGeneration) return;
      if (!partialMsg) {
        const sec = Math.floor((Date.now() - start) / 1000);
        statusEl.textContent = `✅ アップロード完了。索引化中… (${sec}秒)`;
      }
      await new Promise(r => setTimeout(r, 2500));
    }
    if (myGen !== pollGeneration) return;
    statusEl.textContent = partialMsg
      ? partialMsg + "（残りは数分かかることがあります）"
      : "⏳ 索引化に時間がかかっています。少し待ってからチャットで質問してください。";
  }
</script>
</body>
